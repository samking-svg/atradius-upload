<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atradius Escalation Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root {
  --blue: #1a56db; --blue-dark: #1342b0; --blue-light: #ebf3fe;
  --green: #057a55; --green-light: #e3fcef;
  --orange-light: #fdf6b2; --orange-border: #f6c94e;
  --red: #c81e1e; --red-light: #fde8e8;
  --gray: #6b7280; --gray-light: #f3f4f6; --gray-mid: #e5e7eb;
  --text: #111827; --text-muted: #6b7280;
  --border: #e5e7eb; --white: #ffffff;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f2f5; color: var(--text); min-height: 100vh; }

/* HEADER */
.header { background: var(--blue); color: white; padding: 14px 24px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header-icon { font-size: 28px; }
.header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }
.header p { font-size: 12px; opacity: 0.75; margin-top: 2px; }

/* CONTAINER */
.container { max-width: 920px; margin: 0 auto; padding: 24px 16px; }

/* PROGRESS */
.progress-bar { display: flex; align-items: center; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; margin-bottom: 20px; }
.prog-step { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
.prog-step:not(:last-child) { margin-right: 4px; }
.prog-line { flex: 1; height: 2px; background: var(--border); margin: 0 6px; border-radius: 2px; }
.prog-line.done { background: var(--blue); }
.prog-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0;
  border: 2px solid var(--border); background: var(--gray-light); color: var(--gray); }
.prog-step.active .prog-num { background: var(--blue); border-color: var(--blue); color: white; }
.prog-step.done .prog-num { background: var(--blue); border-color: var(--blue); color: white; }
.prog-label { font-size: 11px; font-weight: 600; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prog-step.active .prog-label, .prog-step.done .prog-label { color: var(--blue); }

/* CARDS */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.card-header { margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 700; }
.card-desc { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

/* UPLOAD GRID */
.upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 16px 12px; text-align: center; cursor: pointer; transition: all 0.18s; position: relative; background: var(--gray-light); }
.upload-zone:hover { border-color: var(--blue); background: var(--blue-light); }
.upload-zone.done { border-color: var(--green); border-style: solid; background: var(--green-light); }
.upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 22px; margin-bottom: 5px; }
.upload-title { font-size: 12px; font-weight: 700; }
.upload-hint { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.upload-filename { font-size: 10px; color: var(--green); font-weight: 600; margin-top: 4px; word-break: break-all; line-height: 1.3; }

/* DATE ROW */
.field-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.field-row label { font-size: 13px; font-weight: 600; white-space: nowrap; }
input[type=date] { border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; font-size: 13px; color: var(--text); }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.18s; text-decoration: none; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--blue); color: white; }
.btn-primary:not(:disabled):hover { background: var(--blue-dark); }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { background: #046c4e; }
.btn-outline { background: white; color: var(--blue); border: 2px solid var(--blue); }
.btn-outline:hover { background: var(--blue-light); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.action-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 4px; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.stat { background: var(--gray-light); border-radius: var(--radius); padding: 12px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 800; color: var(--blue); }
.stat-num.green { color: var(--green); }
.stat-num.gray { color: var(--gray); }
.stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; line-height: 1.3; }
.amount-big { font-size: 20px; font-weight: 800; color: var(--green); }

/* TABLE */
.table-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; max-height: 300px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead { position: sticky; top: 0; z-index: 1; }
th { background: var(--gray-light); padding: 8px 10px; text-align: left; font-weight: 700; color: var(--gray); border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 11px; }
td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafbff; }
code { font-family: monospace; font-size: 11px; background: var(--gray-light); padding: 1px 4px; border-radius: 3px; }

/* ALERTS */
.alert { border-radius: 6px; padding: 11px 14px; margin-bottom: 14px; font-size: 13px; display: flex; gap: 10px; }
.alert-info { background: var(--blue-light); border: 1px solid #bcd0f7; color: #1e3a7a; }
.alert-warn { background: var(--orange-light); border: 1px solid var(--orange-border); color: #7d4e00; }
.alert-success { background: var(--green-light); border: 1px solid #84e1bc; color: #03543f; }

/* COPY BOX */
.copy-box { background: var(--gray-light); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-family: monospace; font-size: 10px; word-break: break-all; line-height: 1.7; max-height: 72px; overflow-y: auto; margin-bottom: 6px; color: var(--text-muted); }
.copy-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }

/* SIGMA LINK */
a.sigma-link { display: inline-flex; align-items: center; gap: 6px; background: var(--blue-light); color: var(--blue); padding: 9px 14px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 13px; border: 1px solid #bcd0f7; transition: background 0.15s; }
a.sigma-link:hover { background: #d6e9fd; }

/* REMINDER CARDS */
.reminder { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; }
.reminder-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.reminder-title { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
.reminder-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }

/* BADGE */
.badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-green { background: var(--green-light); color: var(--green); }

/* SPINNER */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* EMPTY STATE */
.empty { text-align: center; padding: 32px; color: var(--text-muted); font-size: 13px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }

/* DIVIDER */
hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

@media (max-width: 600px) {
  .upload-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .prog-label { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏦</div>
  <div>
    <h1>Atradius Escalation Dashboard</h1>
    <p>Weekly checkout escalation workflow — Ankorstore Payment Team</p>
  </div>
</div>

<div class="container">
  <div class="progress-bar" id="progress-bar"></div>
  <div id="step-content"></div>
</div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const S = {
  step: 1,
  dpf1Rows: null, dpf1Name: null,  // parsed rows (supports CSV or XLSX)
  dpf2Rows: null, dpf2Name: null,
  dpf1Start: 3912,  // file line number (1-indexed) to start scanning from
  dpf2Start: 2785,
  candidates: [],
  candidateData: {}, // checkoutId -> full DPF row (for Atradius file generation)
  sigmaFile: null, sigmaName: null,
  finalList: []
};

const STEPS = [
  { n: 1, label: 'Upload Files' },
  { n: 2, label: 'Candidates' },
  { n: 3, label: 'Sigma Check' },
  { n: 4, label: 'Download' }
];

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function isPaid(row) {
  const actionCols = ['Action 1.1', 'Action 1.2', 'Action 1.3', 'Action 2', 'Action 3'];
  for (const col of actionCols) {
    const v = String(row[col] || '').trim().toLowerCase();
    if (v && /x/.test(v)) return true;
  }
  const link = String(row['Payment link'] || '').trim();
  return link.startsWith('http');
}

function getUpdateStatus(row) {
  // DPF.2 has trailing space in header "Update status "
  const key = Object.keys(row).find(k => k.trim() === 'Update status');
  return key ? String(row[key] || '').trim().toLowerCase() : '';
}

function needsEscalation(row) {
  if (isPaid(row)) return false;
  return getUpdateStatus(row) !== 'paid';
}

function toDate(v) {
  if (!v) return null;
  if (v instanceof Date) return isNaN(v) ? null : v;
  if (typeof v === 'number') return new Date((v - 25569) * 86400000);
  const d = new Date(v);
  return isNaN(d) ? null : d;
}

function fmtDate(v) {
  const d = toDate(v);
  if (!d) return '—';
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function fmtAmt(n) {
  const x = parseFloat(n);
  if (isNaN(x)) return String(n || '—');
  return '€' + x.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtTotal(arr) {
  const t = arr.reduce((s, c) => s + (parseFloat(c.amount) || 0), 0);
  return '€' + t.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function readXLSX(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      try { res(XLSX.read(e.target.result, { type: 'array', cellDates: true })); }
      catch (err) { rej(err); }
    };
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}

function parseCSV(file) {
  return new Promise((res, rej) => {
    Papa.parse(file, { header: true, skipEmptyLines: true,
      complete: r => res(r.data), error: rej });
  });
}

// ─────────────────────────────────────────────
// PROCESSING
// ─────────────────────────────────────────────
// Returns true if value looks like a date (DD/MM/YYYY) rather than empty or an 'x' marker
function isActionDate(v) {
  if (v === null || v === undefined) return false;
  const s = String(v).trim();
  if (s === '') return false;
  // 'x', 'X', 'xx', 'XX' etc. are action markers, not dates
  if (/^x+$/i.test(s)) return false;
  return true;
}

function processDPFs() {
  const seen = new Set();
  const candidates = [];

  const sources = [
    { rows: S.dpf1Rows, source: 'DPF.1', startLine: S.dpf1Start },
    { rows: S.dpf2Rows, source: 'DPF.2', startLine: S.dpf2Start }
  ];

  for (const { rows, source, startLine } of sources) {
    // startLine is 1-indexed file line number; header = line 1, data starts line 2 = index 0
    // so data index = file line - 2
    const startIndex = Math.max(0, startLine - 2);
    const subset = rows.slice(startIndex);

    for (const row of subset) {
      const cid = String(row['checkout_id'] || '').trim().replace(/\.0$/, '');
      if (!cid || cid === 'checkout_id' || cid === 'null') continue;
      if (seen.has(cid)) continue;

      // Rule 1: Action 1.1, 1.2, 1.3 must all contain dates (not empty, not 'x')
      if (!isActionDate(row['Action 1.1'])) continue;
      if (!isActionDate(row['Action 1.2'])) continue;
      if (!isActionDate(row['Action 1.3'])) continue;

      // Rule 2: Payment link (BQ) must be empty
      const payLink = String(row['Payment link'] || '').trim();
      if (payLink !== '' && payLink !== 'nan') continue;

      // Rule 3: 'Sent to Atradius?' must be empty
      const sent = String(row['Sent to Atradius?'] || '').trim();
      if (sent !== '' && sent !== 'nan') continue;

      const dueDate = toDate(row['due_date']);
      if (!dueDate || dueDate.getFullYear() > 2100) continue;

      seen.add(cid);
      candidates.push({
        checkoutId: cid,
        dueDate,
        amount: parseFloat(row['bo_amount_to_match_eur']) || 0,
        retailerId: String(row['retailer_id'] || '').trim().replace(/\.0$/, ''),
        retailerName: String(row['retailer_name'] || '').trim(),
        source
      });
      S.candidateData[cid] = { ...row, _source: source };
    }
  }

  candidates.sort((a, b) => a.dueDate - b.dueDate);
  S.candidates = candidates;
}

function processSigma(sigmaRows) {
  const sigmaIds = new Set(
    sigmaRows.map(r => String(r['Id Checkout'] || '').trim()).filter(Boolean)
  );
  S.finalList = S.candidates.filter(c => sigmaIds.has(c.checkoutId));
}

function buildAtradiusShareFile() {
  const wb = XLSX.utils.book_new();

  // ── Debtor Details (one row per unique retailer) ──────────────────────
  const debtorHeaders = [
    'Id Retailer', 'Shop Name', 'Vat Number', 'Customer Address',
    'Post Code', 'City', 'Country', 'Phone Number',
    'Contact Person', 'Contact Person Email',
    'Currencies Chosen by Retailer', 'Comments'
  ];

  const seenRetailers = new Set();
  const debtorRows = [debtorHeaders];

  for (const item of S.finalList) {
    if (seenRetailers.has(item.retailerId)) continue;
    seenRetailers.add(item.retailerId);
    const r = S.candidateData[item.checkoutId] || {};
    const currency = String(r['retailer_currency'] || 'EUR').trim();

    // Contact fields from new DPF columns (BZ–CG)
    const street = String(r['street'] || '').trim();
    const city = String(r['city'] || '').trim();
    const postCode = String(r['cd_postal'] || '').trim();
    // Phone: stored as float in CSV (e.g. 3.363189e+10) — convert to integer string
    const rawPhone = r['phone_number'];
    const phone = rawPhone ? String(Math.round(Number(rawPhone))) : '';
    const firstName = String(r['first_name'] || '').trim();
    const lastName = String(r['last_name'] || '').trim();
    const contactPerson = [firstName, lastName].filter(Boolean).join(' ');
    const email = String(r['email'] || '').trim();
    // Country: prefer the dedicated country column, fall back to retailer_country
    const country = String(r['country'] || r['retailer_country'] || '').trim();

    debtorRows.push([
      parseInt(item.retailerId) || item.retailerId,
      item.retailerName,
      String(r['retailer_vat_number'] || '').trim(),
      street,
      postCode,
      city,
      country,
      phone,
      contactPerson,
      email,
      `["${currency}"]`,
      ''
    ]);
  }

  const debtorWs = XLSX.utils.aoa_to_sheet(debtorRows);
  // Column widths
  debtorWs['!cols'] = [14,25,18,30,10,18,12,16,20,28,24,20].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, debtorWs, 'Debtor Details');

  // ── Financial Details (headers only — data to be filled in manually via Sigma query) ──
  const finHeaders = [
    'Customer Reference', 'Day of Issuing Date', 'Issuing Date _',
    'Due Date _', 'Currency', 'Amount With VAT LC',
    'Amount Without VAT LC', 'Type of Piece',
    'Financial Reference', 'Invoice Number'
  ];
  const finWs = XLSX.utils.aoa_to_sheet([finHeaders]);
  finWs['!cols'] = [18,20,20,12,10,18,20,14,24,20].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, finWs, 'Financial Details');

  // ── Codes sheet (reference, left as header only) ──────────────────────
  const codesWs = XLSX.utils.aoa_to_sheet([['Country', 'Currency', 'Financial elements', 'State']]);
  XLSX.utils.book_append_sheet(wb, codesWs, 'Codes');

  return wb;
}

// Returns date as YYYY-MM-DD string for clean Excel date cells
function fmtDateISO(v) {
  const d = toDate(v);
  if (!d) return '';
  return d.toISOString().slice(0, 10);
}


// ─────────────────────────────────────────────
// RENDER: PROGRESS
// ─────────────────────────────────────────────
function renderProgress() {
  const el = document.getElementById('progress-bar');
  let html = '';
  STEPS.forEach((s, i) => {
    const isDone = S.step > s.n;
    const isActive = S.step === s.n;
    const cls = isDone ? 'prog-step done' : isActive ? 'prog-step active' : 'prog-step';
    const icon = isDone ? '✓' : s.n;
    html += `<div class="${cls}">
      <div class="prog-num">${icon}</div>
      <span class="prog-label">${s.label}</span>
    </div>`;
    if (i < STEPS.length - 1) {
      html += `<div class="prog-line ${isDone ? 'done' : ''}"></div>`;
    }
  });
  el.innerHTML = html;
}

// ─────────────────────────────────────────────
// RENDER: STEP 1 — Upload
// ─────────────────────────────────────────────
function renderStep1() {
  const z = (key, title, hint, accept) => {
    const uploaded = S[key + 'Name'];
    return `<div class="upload-zone ${uploaded ? 'done' : ''}" onclick="document.getElementById('input-${key}').click()">
      <input id="input-${key}" type="file" accept="${accept}" style="display:none" onchange="handleFile(event,'${key}')">
      <div class="upload-icon">${uploaded ? '✅' : '📄'}</div>
      <div class="upload-title">${title}</div>
      <div class="upload-hint">${hint}</div>
      ${uploaded ? `<div class="upload-filename">${uploaded}</div>` : ''}
    </div>`;
  };

  const allReady = S.dpf1Rows && S.dpf2Rows;

  return `<div class="card">
    <div class="card-header">
      <div class="card-title">Upload your DPF files</div>
      <div class="card-desc">These are read locally in your browser — nothing is sent anywhere.</div>
    </div>
    <div class="upload-grid" style="grid-template-columns: repeat(2, 1fr)">
      ${z('dpf1', 'DPF.1 — Disputed', '.csv or .xlsx', '.csv,.xlsx,.xls')}
      ${z('dpf2', 'DPF.2 — Failed', '.csv or .xlsx', '.csv,.xlsx,.xls')}
    </div>
    <div style="background:var(--gray-light);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--text-muted)">START ROW — update these each run to match the first new row in each file</div>
      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <div class="field-row" style="margin-bottom:0">
          <label>DPF.1 start line:</label>
          <input type="number" value="${S.dpf1Start}" min="2" style="width:90px" onchange="S.dpf1Start=parseInt(this.value)||3912; render();">
        </div>
        <div class="field-row" style="margin-bottom:0">
          <label>DPF.2 start line:</label>
          <input type="number" value="${S.dpf2Start}" min="2" style="width:90px" onchange="S.dpf2Start=parseInt(this.value)||2785; render();">
        </div>
      </div>
    </div>
    <div class="action-row">
      <button class="btn btn-primary" id="process-btn" onclick="runStep1(this)" ${allReady ? '' : 'disabled'}>
        Process Files &rarr;
      </button>
      ${allReady ? '' : '<span style="font-size:12px;color:var(--text-muted)">Upload both DPF files to continue</span>'}
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// RENDER: STEP 2 — Candidates
// ─────────────────────────────────────────────
function renderStep2() {
  const n = S.candidates.length;
  const dpf1n = S.candidates.filter(c => c.source === 'DPF.1').length;
  const dpf2n = S.candidates.filter(c => c.source === 'DPF.2').length;
  const ids = S.candidates.map(c => c.checkoutId).join(', ');

  const rows = S.candidates.map((c, i) => `<tr>
    <td style="color:var(--text-muted);font-size:11px">${i + 1}</td>
    <td><code>${c.checkoutId}</code></td>
    <td>${c.retailerName}</td>
    <td>${fmtDate(c.dueDate)}</td>
    <td style="font-weight:600">${fmtAmt(c.amount)}</td>
    <td><span class="badge badge-blue">${c.source}</span></td>
  </tr>`).join('');

  const emptyTable = `<div class="empty"><div class="empty-icon">🎉</div>No new candidates found since last escalation date.</div>`;

  return `
  <div class="card">
    <div class="card-header">
      <div class="card-title">Candidates identified</div>
      <div class="card-desc">Actions 1.1–1.3 complete · no payment link · not yet sent to Atradius</div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">${n}</div><div class="stat-label">Total candidates</div></div>
      <div class="stat"><div class="stat-num">${dpf2n}</div><div class="stat-label">From DPF.2 (Failed)</div></div>
      <div class="stat"><div class="stat-num">${dpf1n}</div><div class="stat-label">From DPF.1 (Disputed)</div></div>
      <div class="stat"><div class="amount-big">${fmtTotal(S.candidates)}</div><div class="stat-label">Total value</div></div>
    </div>
    ${n > 0 ? `<div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Checkout ID</th><th>Retailer</th><th>Due Date</th><th>Amount</th><th>Source</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>` : emptyTable}
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">🔍 Verify in Sigma</div>
      <div class="card-desc">Download the <strong>Defaulted Checkouts</strong> table from Sigma. Any checkout ID that does <em>not</em> appear there is already paid — it will be filtered out in the next step.</div>
    </div>
    <div style="margin-bottom:12px">
      <a href="https://app.sigmacomputing.com/ankorstore/workbook/Finance-FP-and-A-Reconciliation-and-Recovery-5pTyENUhnjU1FN4mRGXRxZ?:nodeId=xGACtnihGG&:fullScreen=true" target="_blank" class="sigma-link">
        🔗 Open Sigma — Defaulted Checkouts Table
      </a>
    </div>
    <div style="font-size:12px;font-weight:700;margin-bottom:4px">Checkout IDs to check (${n} total):</div>
    <div class="copy-box" id="ids-box">${ids || '—'}</div>
    <div class="copy-row">
      <button class="btn btn-outline btn-sm" onclick="copyIds()">📋 Copy all IDs</button>
      <span id="copy-confirm" style="font-size:12px;color:var(--green);display:none">✅ Copied!</span>
    </div>
    <hr>
    <div class="action-row">
      <button class="btn btn-primary" onclick="S.step=3; render()">I've downloaded the Sigma export &rarr;</button>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// RENDER: STEP 3 — Sigma upload
// ─────────────────────────────────────────────
function renderStep3() {
  const uploaded = !!S.sigmaName;
  return `<div class="card">
    <div class="card-header">
      <div class="card-title">Upload Sigma export</div>
      <div class="card-desc">Upload the CSV you downloaded from the Defaulted Checkouts table. Checkouts <em>not</em> present in this file will be removed (they're paid).</div>
    </div>
    <div class="upload-zone ${uploaded ? 'done' : ''}" onclick="document.getElementById('input-sigma').click()" style="max-width:380px;margin-bottom:16px">
      <input id="input-sigma" type="file" accept=".csv" style="display:none" onchange="handleSigma(event)">
      <div class="upload-icon">${uploaded ? '✅' : '📥'}</div>
      <div class="upload-title">Defaulted Checkouts CSV</div>
      <div class="upload-hint">Downloaded from Sigma</div>
      ${uploaded ? `<div class="upload-filename">${S.sigmaName}</div>` : ''}
    </div>
    <div class="action-row">
      <button class="btn btn-outline btn-sm" onclick="S.step=2; render()">&larr; Back</button>
      <button class="btn btn-primary" id="xref-btn" onclick="runStep3(this)" ${uploaded ? '' : 'disabled'}>
        Cross-reference &rarr;
      </button>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// RENDER: STEP 4 — Final list + download
// ─────────────────────────────────────────────
function renderStep4() {
  const final = S.finalList;
  const excluded = S.candidates.length - final.length;

  const rows = final.map((c, i) => `<tr>
    <td style="color:var(--text-muted);font-size:11px">${i + 1}</td>
    <td><code>${c.checkoutId}</code></td>
    <td>${c.retailerName}</td>
    <td>${c.retailerId}</td>
    <td>${fmtDate(c.dueDate)}</td>
    <td style="font-weight:600">${fmtAmt(c.amount)}</td>
  </tr>`).join('');

  return `
  <div class="card">
    <div class="card-header">
      <div class="card-title">✅ Final escalation list</div>
      <div class="card-desc">${excluded} checkout${excluded !== 1 ? 's' : ''} removed (paid / not in Sigma). Ready to add to Atradius worksheet.</div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num green">${final.length}</div><div class="stat-label">To escalate</div></div>
      <div class="stat"><div class="stat-num gray">${excluded}</div><div class="stat-label">Removed (paid)</div></div>
      <div class="stat" style="grid-column:span 2"><div class="amount-big">${fmtTotal(final)}</div><div class="stat-label">Total value to recover</div></div>
    </div>
    ${final.length > 0 ? `<div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Checkout ID</th><th>Retailer Name</th><th>Retailer ID</th><th>Due Date</th><th>Amount</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>` : '<div class="empty"><div class="empty-icon">🎉</div>No checkouts to escalate — all are paid!</div>'}
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">📋 Don't forget these manual steps</div>
    </div>

    <div class="reminder">
      <div class="reminder-icon">📊</div>
      <div>
        <div class="reminder-title">1 — Update the tracking Google Sheet</div>
        <div class="reminder-desc">Log the new escalations in the Atradius recovery tracking sheet.</div>
        <a href="https://docs.google.com/spreadsheets/d/1C3836wgHOdjbZXuyCAClHWpYXUzJ5rYRFh5Lnu46BfI/edit?gid=0#gid=0" target="_blank" class="sigma-link">🔗 Open Google Sheet</a>
      </div>
    </div>

    <div class="reminder">
      <div class="reminder-icon">📤</div>
      <div style="flex:1;min-width:0">
        <div class="reminder-title">2 — Run the Sigma query to get Financial Details data</div>
        <div class="reminder-desc">Run the query on Sigma using the filter below, then paste the results into the <strong>Financial Details</strong> tab of the downloaded file before sending to Atradius.</div>
        <a href="https://docs.google.com/spreadsheets/d/1V791lA5bQSx-B1WQhwRSyBZp7ZsD4XfH9wh1MQkEyTk/edit?gid=1454968430#gid=1454968430" target="_blank" class="sigma-link" style="margin-top:6px;display:inline-block">🔗 Open Google Sheet</a>
        ${final.length > 0 ? `
        <div style="margin-top:10px">
          <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">SQL WHERE filter — paste into the query:</div>
          <div style="position:relative">
            <pre id="sql-filter" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 40px 10px 12px;font-size:12px;font-family:monospace;white-space:pre-wrap;word-break:break-all;margin:0;color:var(--text)">${(() => {
              const ids = final.map(c => `'${c.checkoutId}'`);
              const chunkSize = 4;
              const lines = [];
              for (let i = 0; i < ids.length; i += chunkSize) {
                lines.push('  ' + ids.slice(i, i + chunkSize).join(', '));
              }
              return `WHERE c.id_checkout IN (\n${lines.join(',\n')}\n)`;
            })()}</pre>
            <button onclick="copyFilter()" title="Copy to clipboard" style="position:absolute;top:6px;right:6px;background:var(--primary);color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer">📋 Copy</button>
          </div>
        </div>` : ''}
        <div style="margin-top:10px">
          <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">3 — Download & complete the Atradius sharing file</div>
          <div style="font-size:13px;color:var(--text-muted)">Downloads the file with <strong>Debtor Details</strong> pre-filled. Paste the Sigma query results into the <strong>Financial Details</strong> tab, then send to Atradius.</div>
          ${final.length > 0 ? `<button class="btn btn-primary btn-sm" onclick="downloadAtradiusFile()" style="margin-top:6px">⬇️ Download Atradius Sharing File</button>` : ''}
        </div>
      </div>
    </div>

    <hr>
    <div class="action-row">
      <button class="btn btn-outline btn-sm" onclick="resetAll()">🔄 Start a new run</button>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// EVENT HANDLERS
// ─────────────────────────────────────────────
async function handleFile(event, key) {
  const file = event.target.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  try {
    // DPF files: accept CSV or XLSX
    let rows;
    if (ext === 'csv') {
      rows = await parseCSV(file);
    } else {
      const wb = await readXLSX(file);
      const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws, { defval: null });
    }
    S[key + 'Rows'] = rows;
    S[key + 'Name'] = file.name;
    render();
  } catch (e) {
    alert('Could not read file: ' + e.message);
  }
}

async function handleSigma(event) {
  const file = event.target.files[0];
  if (!file) return;
  S.sigmaFile = file;
  S.sigmaName = file.name;
  render();
}

async function runStep1(btn) {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Processing...';
  await new Promise(r => setTimeout(r, 50)); // let UI update
  try {
    processDPFs();
    S.step = 2;
    render();
  } catch (e) {
    alert('Error processing files: ' + e.message);
    render();
  }
}

async function runStep3(btn) {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Cross-referencing...';
  await new Promise(r => setTimeout(r, 50));
  try {
    const rows = await parseCSV(S.sigmaFile);
    processSigma(rows);
    S.step = 4;
    render();
  } catch (e) {
    alert('Error: ' + e.message);
    render();
  }
}

function copyFilter() {
  const el = document.getElementById('sql-filter');
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.parentElement.querySelector('button');
    if (btn) { btn.textContent = '✅ Copied!'; setTimeout(() => btn.textContent = '📋 Copy', 2000); }
  }).catch(() => {
    // Fallback for non-HTTPS
    const ta = document.createElement('textarea');
    ta.value = el.textContent;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = el.parentElement.querySelector('button');
    if (btn) { btn.textContent = '✅ Copied!'; setTimeout(() => btn.textContent = '📋 Copy', 2000); }
  });
}

function downloadAtradiusFile() {
  try {
    const wb = buildAtradiusShareFile();
    const today = new Date();
    const dd = String(today.getDate()).padStart(2, '0');
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const yyyy = today.getFullYear();
    XLSX.writeFile(wb, `${dd}${mm}${yyyy}_Ankorstore_SAS.xlsx`);
  } catch (e) {
    alert('Download error: ' + e.message);
  }
}

function copyIds() {
  const ids = S.candidates.map(c => c.checkoutId).join(', ');
  navigator.clipboard.writeText(ids).then(() => {
    const el = document.getElementById('copy-confirm');
    if (el) { el.style.display = 'inline'; setTimeout(() => el.style.display = 'none', 2500); }
  }).catch(() => {
    const box = document.getElementById('ids-box');
    if (box) { const range = document.createRange(); range.selectNode(box); window.getSelection().removeAllRanges(); window.getSelection().addRange(range); }
  });
}

function resetAll() {
  Object.assign(S, { step: 1, dpf1Rows: null, dpf1Name: null, dpf2Rows: null, dpf2Name: null, dpf1Start: 3912, dpf2Start: 2785, candidates: [], candidateData: {}, sigmaFile: null, sigmaName: null, finalList: [] });
  render();
}

// ─────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────
function render() {
  renderProgress();
  const el = document.getElementById('step-content');
  if (S.step === 1) el.innerHTML = renderStep1();
  else if (S.step === 2) el.innerHTML = renderStep2();
  else if (S.step === 3) el.innerHTML = renderStep3();
  else if (S.step === 4) el.innerHTML = renderStep4();
}

render();
</script>
